name: Release

on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Setup bnd
        uses: carabiner-dev/actions/install/bnd@7d7c2b1154a01df68e3fc4f12d07fd148a302a94 # v1.1.4

      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install tejolote
        uses: kubernetes-sigs/release-actions/setup-tejolote@cead1599f005647418bc8fd4a1c8c174485d4016 # v0.4.2

      - name: Set tag output
        id: tag
        run: echo "tag_name=${GITHUB_REF#refs/*/}" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        id: goreleaser
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Provenance
        id: tejolote
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            tejolote attest --artifacts github://${{github.repository}}/${{ steps.tag.outputs.tag_name }} github://${{github.repository}}/"${GITHUB_RUN_ID}" --output provenance.json
            bnd statement provenance.json -o snappy-${{ steps.tag.outputs.tag_name }}.provenance.json
            gh release upload ${{ steps.tag.outputs.tag_name }} snappy-${{ steps.tag.outputs.tag_name }}.provenance.json
            bnd push ${{github.repository}} snappy-${{ steps.tag.outputs.tag_name }}.provenance.json

      - name: Generate SBOM
        id: sbom
        uses: carabiner-dev/actions/unpack/sbom@7d7c2b1154a01df68e3fc4f12d07fd148a302a94 # v1.1.4
        with:
          output-path: /tmp

      - name: Upload SBOM
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for f in ${{ steps.sbom.outputs.files }}; do
            gh release upload ${{ steps.tag.outputs.tag_name }} "$f"
          done
